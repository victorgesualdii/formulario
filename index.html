<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Gerador de Procuração</title>

<script src="https://unpkg.com/pizzip@3.1.5/dist/pizzip.js"></script>

<script src="https://unpkg.com/docxtemplater@3.37.0/build/docxtemplater.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
body { font-family: Arial; max-width: 600px; margin: auto; }
input { width: 100%; padding: 8px; margin-bottom: 10px; }
button { padding: 10px; font-size: 16px; }
</style>

</head>

<body>

<h2>Gerador de Procuração</h2>

<input id="Nome_completo" placeholder="Nome completo">
<input id="Data_nascimento" placeholder="Data de nascimento">
<input id="Estado_nascimento" placeholder="Estado de nascimento">
<input id="Tribunal" placeholder="Tribunal">

<button onclick="gerar()">Gerar Documento</button>

<script>

async function gerar() {

let response = await fetch("Teste.docx");
let content = await response.arrayBuffer();

let zip = new PizZip(content);

let doc = new docxtemplater(zip, {
delimiters: {
start: "[[",
end: "]]"
}
});

doc.render({
Nome_completo: document.getElementById("Nome_completo").value,
Data_nascimento: document.getElementById("Data_nascimento").value,
Estado_nascimento: document.getElementById("Estado_nascimento").value,
Tribunal: document.getElementById("Tribunal").value
});

let out = doc.getZip().generate({
type: "blob"
});

let nome = document.getElementById("Nome_completo").value || "documento";
nome = nome.replace(/[\\/:*?"<>|]/g, "");

saveAs(out, nome.replace(/ /g,"_") + ".docx");

}

</script>

</body>
</html>
